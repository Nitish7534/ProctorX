<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Results - Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .results-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #2196F3;
            margin: 10px 0;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        select, input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .results-table th {
            background: #2196F3;
            color: white;
            padding: 15px;
            text-align: left;
        }
        
        .results-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .results-table tr:hover {
            background: #f5f5f5;
        }
        
        .score-cell {
            font-weight: bold;
            text-align: center;
        }
        
        .percentage {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .high { background: #4CAF50; color: white; }
        .medium { background: #FF9800; color: white; }
        .low { background: #f44336; color: white; }
        
        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            margin: 0 2px;
        }
        
        .btn-details { background: #2196F3; color: white; }
        .btn-photos { background: #9C27B0; color: white; }
        .btn-flag { background: #FF9800; color: white; }
        
        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin: 20px 0;
            text-align: center;
        }
        
        .chart-placeholder {
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            border-radius: 5px;
            color: #666;
            font-size: 18px;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        
        .export-options {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="results-container">
        <h1><i class="fas fa-chart-bar"></i> Exam Results</h1>
        <p>View and analyze student performance</p>
        
        <div class="links" style="margin-bottom: 20px;">
            <a href="admin_dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            <a href="manage_exams.html"><i class="fas fa-tasks"></i> Manage Exams</a>
        </div>
        
        <!-- Statistics Cards -->
        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-number" id="totalAttempts">0</div>
                <div class="stat-label">Total Attempts</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgScore">0%</div>
                <div class="stat-label">Average Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="passRate">0%</div>
                <div class="stat-label">Pass Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="violations">0</div>
                <div class="stat-label">Total Violations</div>
            </div>
        </div>
        
        <!-- Controls -->
        <div class="controls">
            <select id="examFilter" onchange="filterResults()">
                <option value="all">All Exams</option>
                <!-- Options will be populated dynamically -->
            </select>
            
            <select id="studentFilter" onchange="filterResults()">
                <option value="all">All Students</option>
                <!-- Options will be populated dynamically -->
            </select>
            
            <input type="date" id="dateFrom" onchange="filterResults()" placeholder="From Date">
            <input type="date" id="dateTo" onchange="filterResults()" placeholder="To Date">
            
            <div class="export-options">
                <button onclick="exportToCSV()" class="btn" style="background: #4CAF50;">
                    <i class="fas fa-file-csv"></i> Export CSV
                </button>
                <button onclick="printResults()" class="btn" style="background: #2196F3;">
                    <i class="fas fa-print"></i> Print
                </button>
            </div>
        </div>
        
        <!-- Chart Placeholder -->
        <div class="chart-container">
            <h3>Performance Distribution</h3>
            <div class="chart-placeholder">
                <i class="fas fa-chart-pie"></i> Performance chart will be displayed here
            </div>
        </div>
        
        <!-- Results Table -->
        <div id="resultsTableContainer" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Loading results...
        </div>
        
        <!-- Details Modal -->
        <div id="detailsModal" class="modal">
            <div class="modal-content">
                <h2 id="detailsTitle"></h2>
                <div id="detailsContent"></div>
                <div class="modal-actions">
                    <button onclick="closeModal()" class="action-btn" style="background: #666;">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check admin login
        const admin = JSON.parse(localStorage.getItem('admin'));
        if (!admin || admin.role !== 'admin') {
            alert('Access denied. Please login as admin.');
            window.location.href = 'admin_login.html';
        }
        
        let allResults = [];
        let allExams = [];
        let allStudents = [];
        
        // Get exam ID from URL if present
        const urlParams = new URLSearchParams(window.location.search);
        const examIdFromUrl = urlParams.get('exam_id');
        
        async function loadData() {
            try {
                // Load all results
                const resultsResponse = await fetch('http://localhost:5000/api/admin/all-results');
                const resultsData = await resultsResponse.json();
                
                if (resultsResponse.ok) {
                    allResults = resultsData;
                    displayResults(allResults);
                    calculateStatistics(allResults);
                }
                
                // Load exams for filter
                const examsResponse = await fetch('http://localhost:5000/api/admin/exams');
                const examsData = await examsResponse.ok ? await examsResponse.json() : [];
                allExams = examsData;
                populateExamFilter();
                
                // Load students for filter
                const studentsResponse = await fetch('http://localhost:5000/api/admin/students');
                const studentsData = await studentsResponse.ok ? await studentsResponse.json() : [];
                allStudents = studentsData;
                populateStudentFilter();
                
                // If exam ID is in URL, filter by that exam
                if (examIdFromUrl) {
                    document.getElementById('examFilter').value = examIdFromUrl;
                    filterResults();
                }
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('resultsTableContainer').innerHTML = 
                    `<p style="color: red;">Error loading results: ${error.message}</p>`;
            }
        }
        
        function populateExamFilter() {
            const examFilter = document.getElementById('examFilter');
            examFilter.innerHTML = '<option value="all">All Exams</option>';
            
            allExams.forEach(exam => {
                const option = document.createElement('option');
                option.value = exam.id;
                option.textContent = `${exam.title} (ID: ${exam.id})`;
                examFilter.appendChild(option);
            });
        }
        
        function populateStudentFilter() {
            const studentFilter = document.getElementById('studentFilter');
            studentFilter.innerHTML = '<option value="all">All Students</option>';
            
            allStudents.forEach(student => {
                const option = document.createElement('option');
                option.value = student.id;
                option.textContent = `${student.name} (${student.email})`;
                studentFilter.appendChild(option);
            });
        }
        
        function calculateStatistics(results) {
            if (results.length === 0) {
                document.getElementById('totalAttempts').textContent = '0';
                document.getElementById('avgScore').textContent = '0%';
                document.getElementById('passRate').textContent = '0%';
                document.getElementById('violations').textContent = '0';
                return;
            }
            
            const totalAttempts = results.length;
            const totalScore = results.reduce((sum, result) => sum + result.score, 0);
            const totalMarks = results.reduce((sum, result) => sum + result.total_marks, 0);
            const totalViolations = results.reduce((sum, result) => sum + (result.violations || 0), 0);
            
            const avgScore = totalMarks > 0 ? ((totalScore / totalMarks) * 100).toFixed(1) : 0;
            const passCount = results.filter(r => r.score >= r.total_marks * 0.4).length;
            const passRate = ((passCount / totalAttempts) * 100).toFixed(1);
            
            document.getElementById('totalAttempts').textContent = totalAttempts;
            document.getElementById('avgScore').textContent = `${avgScore}%`;
            document.getElementById('passRate').textContent = `${passRate}%`;
            document.getElementById('violations').textContent = totalViolations;
        }
        
        function displayResults(results) {
            const container = document.getElementById('resultsTableContainer');
            
            if (results.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-chart-line" style="font-size: 48px; color: #ccc; margin-bottom: 20px;"></i>
                        <h3>No Results Found</h3>
                        <p>No exam attempts have been recorded yet.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            
            const table = document.createElement('table');
            table.className = 'results-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Student</th>
                        <th>Exam</th>
                        <th>Score</th>
                        <th>Percentage</th>
                        <th>Duration</th>
                        <th>Violations</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                </tbody>
            `;
            
            container.appendChild(table);
            
            const tbody = document.getElementById('resultsBody');
            results.forEach(result => {
                const row = document.createElement('tr');
                
                // Calculate percentage
                const percentage = result.total_marks > 0 ? 
                    ((result.score / result.total_marks) * 100).toFixed(1) : 0;
                
                // Determine percentage class
                let percentageClass = 'medium';
                if (percentage >= 70) percentageClass = 'high';
                else if (percentage < 40) percentageClass = 'low';
                
                // Calculate duration
                const startTime = new Date(result.start_time);
                const endTime = new Date(result.end_time);
                const durationMs = endTime - startTime;
                const durationMin = Math.round(durationMs / (1000 * 60));
                
                // Format date
                const attemptDate = new Date(result.end_time).toLocaleDateString();
                
                row.innerHTML = `
                    <td>${result.id}</td>
                    <td>
                        <strong>${result.student_name}</strong><br>
                        <small>${result.student_email}</small>
                    </td>
                    <td>
                        <strong>${result.exam_title}</strong><br>
                        <small>${result.exam_subject}</small>
                    </td>
                    <td class="score-cell">${result.score}/${result.total_marks}</td>
                    <td>
                        <span class="percentage ${percentageClass}">${percentage}%</span>
                    </td>
                    <td>${durationMin} min</td>
                    <td>${result.violations || 0}</td>
                    <td>${attemptDate}</td>
                    <td>
                        <button onclick="viewResultDetails(${result.id})" class="action-btn btn-details" title="View Details">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button onclick="viewPhotos(${result.id})" class="action-btn btn-photos" title="View Photos">
                            <i class="fas fa-camera"></i>
                        </button>
                        ${result.violations > 0 ? `
                            <button onclick="flagResult(${result.id})" class="action-btn btn-flag" title="Flagged">
                                <i class="fas fa-flag"></i>
                            </button>
                        ` : ''}
                    </td>
                `;
                
                tbody.appendChild(row);
            });
        }
        
        function filterResults() {
            const examId = document.getElementById('examFilter').value;
            const studentId = document.getElementById('studentFilter').value;
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            
            let filtered = allResults;
            
            // Filter by exam
            if (examId !== 'all') {
                filtered = filtered.filter(result => result.exam_id == examId);
            }
            
            // Filter by student
            if (studentId !== 'all') {
                filtered = filtered.filter(result => result.student_id == studentId);
            }
            
            // Filter by date
            if (dateFrom) {
                const fromDate = new Date(dateFrom);
                filtered = filtered.filter(result => new Date(result.end_time) >= fromDate);
            }
            
            if (dateTo) {
                const toDate = new Date(dateTo);
                toDate.setHours(23, 59, 59, 999); // End of day
                filtered = filtered.filter(result => new Date(result.end_time) <= toDate);
            }
            
            displayResults(filtered);
            calculateStatistics(filtered);
        }
        
        async function viewResultDetails(resultId) {
            try {
                // Find the result in our data
                const result = allResults.find(r => r.id == resultId);
                if (!result) {
                    alert('Result not found');
                    return;
                }
                
                document.getElementById('detailsTitle').textContent = 
                    `Exam Attempt Details - ID: ${resultId}`;
                
                const percentage = result.total_marks > 0 ? 
                    ((result.score / result.total_marks) * 100).toFixed(1) : 0;
                
                const startTime = new Date(result.start_time);
                const endTime = new Date(result.end_time);
                const durationMs = endTime - startTime;
                const durationMin = Math.floor(durationMs / (1000 * 60));
                const durationSec = Math.floor((durationMs % (1000 * 60)) / 1000);
                
                let detailsHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div>
                            <p><strong>Student:</strong> ${result.student_name}</p>
                            <p><strong>Email:</strong> ${result.student_email}</p>
                            <p><strong>Exam:</strong> ${result.exam_title}</p>
                            <p><strong>Subject:</strong> ${result.exam_subject}</p>
                        </div>
                        <div>
                            <p><strong>Score:</strong> ${result.score}/${result.total_marks}</p>
                            <p><strong>Percentage:</strong> ${percentage}%</p>
                            <p><strong>Duration:</strong> ${durationMin}m ${durationSec}s</p>
                            <p><strong>Violations:</strong> ${result.violations || 0}</p>
                        </div>
                    </div>
                    
                    <div style="background: #f5f5f5; padding: 15px; border-radius: 5px;">
                        <p><strong>Start Time:</strong> ${startTime.toLocaleString()}</p>
                        <p><strong>End Time:</strong> ${endTime.toLocaleString()}</p>
                        <p><strong>Status:</strong> ${result.status || 'Completed'}</p>
                    </div>
                `;
                
                document.getElementById('detailsContent').innerHTML = detailsHTML;
                document.getElementById('detailsModal').style.display = 'flex';
                
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }
        
        async function viewPhotos(attemptId) {
            try {
                const response = await fetch(`http://localhost:5000/api/admin/attempt/${attemptId}/photos`);
                const photos = await response.json();
                
                if (response.ok) {
                    document.getElementById('detailsTitle').textContent = 
                        `Captured Photos - Attempt ID: ${attemptId}`;
                    
                    let photosHTML = `<p><strong>Total Photos:</strong> ${photos.length}</p>`;
                    
                    if (photos.length > 0) {
                        photosHTML += '<div style="max-height: 400px; overflow-y: auto;">';
                        photos.forEach((photo, index) => {
                            const timestamp = new Date(photo.timestamp).toLocaleString();
                            const violations = photo.violations_detected ? 
                                JSON.parse(photo.violations_detected).join(', ') : 'None';
                            
                            photosHTML += `
                                <div style="margin: 10px 0; padding: 10px; background: white; border-radius: 5px;">
                                    <p><strong>Photo ${index + 1}:</strong> ${timestamp}</p>
                                    <p><strong>Violations Detected:</strong> ${violations}</p>
                                    <div style="background: #eee; padding: 10px; text-align: center;">
                                        <i class="fas fa-camera" style="font-size: 24px; color: #666;"></i>
                                        <p style="color: #666; font-size: 12px;">Photo data stored in database</p>
                                    </div>
                                </div>
                            `;
                        });
                        photosHTML += '</div>';
                    } else {
                        photosHTML += '<p>No photos captured for this attempt.</p>';
                    }
                    
                    document.getElementById('detailsContent').innerHTML = photosHTML;
                    document.getElementById('detailsModal').style.display = 'flex';
                    
                } else {
                    alert('Error loading photos');
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }
        
        function flagResult(resultId) {
            alert(`Flagging result ${resultId} - This feature will be implemented next!`);
        }
        
        function exportToCSV() {
            alert('Export to CSV feature will be implemented next!');
            // Implementation would convert results to CSV format and download
        }
        
        function printResults() {
            window.print();
        }
        
        function closeModal() {
            document.getElementById('detailsModal').style.display = 'none';
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal();
            }
        };
        
        // Set default dates (last 30 days)
        window.onload = function() {
            const today = new Date();
            const monthAgo = new Date();
            monthAgo.setDate(today.getDate() - 30);
            
            document.getElementById('dateFrom').valueAsDate = monthAgo;
            document.getElementById('dateTo').valueAsDate = today;
            
            loadData();
        };
    </script>
</body>
</html>
