<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Exam - Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .exam-form {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .form-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
        
        .question-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #4CAF50;
            position: relative;
        }
        
        .question-number {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4CAF50;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .option-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            padding: 8px;
            background: white;
            border-radius: 5px;
        }
        
        .option-label {
            min-width: 30px;
            font-weight: bold;
        }
        
        .correct-option {
            background: #e8f5e9;
            border: 2px solid #4CAF50;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .btn-add {
            background: #4CAF50;
            color: white;
            margin: 10px 0;
        }
        
        .btn-remove {
            background: #f44336;
            color: white;
            padding: 5px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn-save {
            background: #2196F3;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .preview-box {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #4CAF50;
        }
        
        .marks-input {
            width: 80px;
        }
        
        .char-count {
            font-size: 12px;
            color: #666;
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-plus-circle"></i> Create New Exam</h1>
        <p>Fill in the exam details and add questions</p>
        
        <div class="links" style="margin-bottom: 20px;">
            <a href="admin_dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
        
        <div class="exam-form">
            <!-- Exam Details -->
            <div class="form-section">
                <h2><i class="fas fa-info-circle"></i> Exam Details</h2>
                
                <div class="form-group">
                    <label for="examTitle">Exam Title *</label>
                    <input type="text" id="examTitle" placeholder="e.g., Mathematics Final Exam" required>
                </div>
                
                <div class="form-group">
                    <label for="examSubject">Subject *</label>
                    <input type="text" id="examSubject" placeholder="e.g., Mathematics, Science, etc." required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="duration">Duration (minutes) *</label>
                        <input type="number" id="duration" min="5" max="180" value="60" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="totalMarks">Total Marks *</label>
                        <input type="number" id="totalMarks" min="10" max="500" value="100" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="instructions">Instructions (Optional)</label>
                    <textarea id="instructions" rows="3" placeholder="Enter exam instructions for students..."></textarea>
                    <div class="char-count" id="instructionsCount">0/500 characters</div>
                </div>
            </div>
            
            <!-- Questions Section -->
            <div class="form-section">
                <h2><i class="fas fa-question-circle"></i> Exam Questions</h2>
                <p>Add questions for the exam. Each question can have up to 4 options.</p>
                
                <div id="questionsContainer">
                    <!-- Questions will be added here dynamically -->
                </div>
                
                <button type="button" onclick="addQuestion()" class="btn btn-add">
                    <i class="fas fa-plus"></i> Add New Question
                </button>
                
                <div style="margin-top: 20px;">
                    <strong>Total Questions: <span id="totalQuestions">0</span></strong> |
                    <strong>Calculated Total Marks: <span id="calculatedMarks">0</span></strong>
                </div>
            </div>
            
            <!-- Preview & Submit -->
            <div class="form-section">
                <h2><i class="fas fa-eye"></i> Preview & Submit</h2>
                
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <button type="button" onclick="previewExam()" class="btn" style="background: #FF9800;">
                        <i class="fas fa-eye"></i> Preview Exam
                    </button>
                    
                    <button type="button" onclick="validateExam()" class="btn" style="background: #4CAF50;">
                        <i class="fas fa-check-circle"></i> Validate Exam
                    </button>
                </div>
                
                <div id="previewBox" class="preview-box">
                    <!-- Preview will appear here -->
                </div>
                
                <div id="validationMessage" class="message" style="margin: 20px 0;"></div>
                
                <div style="text-align: center; margin-top: 30px;">
                    <button onclick="submitExam()" class="btn btn-save">
                        <i class="fas fa-save"></i> Create Exam
                    </button>
                </div>
            </div>
        </div>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        // Check admin login
        const admin = JSON.parse(localStorage.getItem('admin'));
        if (!admin || admin.role !== 'admin') {
            alert('Access denied. Please login as admin.');
            window.location.href = 'admin_login.html';
        }
        
        let questionCount = 0;
        const questions = [];
        
        // Character counter for instructions
        document.getElementById('instructions').addEventListener('input', function() {
            const count = this.value.length;
            document.getElementById('instructionsCount').textContent = `${count}/500 characters`;
            if (count > 500) {
                this.value = this.value.substring(0, 500);
            }
        });
        
        // Add first question on page load
        window.onload = function() {
            addQuestion();
        };
        
        function addQuestion() {
            questionCount++;
            const questionId = `question-${questionCount}`;
            
            const questionHTML = `
                <div class="question-card" id="${questionId}">
                    <div class="question-number">${questionCount}</div>
                    
                    <div class="form-group">
                        <label>Question ${questionCount} *</label>
                        <textarea class="question-text" placeholder="Enter the question text..." 
                                  oninput="updateCharCount(this, '${questionId}')"></textarea>
                        <div class="char-count" id="charCount-${questionId}">0/1000 characters</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Options (Select the correct one)</label>
                        
                        <div class="option-row" onclick="setCorrectOption('${questionId}', 'A')">
                            <div class="option-label">A</div>
                            <input type="text" class="option-input" placeholder="Option A" data-option="A">
                            <input type="radio" name="correct-${questionId}" value="A">
                        </div>
                        
                        <div class="option-row" onclick="setCorrectOption('${questionId}', 'B')">
                            <div class="option-label">B</div>
                            <input type="text" class="option-input" placeholder="Option B" data-option="B">
                            <input type="radio" name="correct-${questionId}" value="B">
                        </div>
                        
                        <div class="option-row" onclick="setCorrectOption('${questionId}', 'C')">
                            <div class="option-label">C</div>
                            <input type="text" class="option-input" placeholder="Option C" data-option="C">
                            <input type="radio" name="correct-${questionId}" value="C">
                        </div>
                        
                        <div class="option-row" onclick="setCorrectOption('${questionId}', 'D')">
                            <div class="option-label">D</div>
                            <input type="text" class="option-input" placeholder="Option D" data-option="D">
                            <input type="radio" name="correct-${questionId}" value="D">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Marks for this question *</label>
                            <input type="number" class="marks-input" min="1" max="20" value="5">
                        </div>
                        
                        <div class="form-group">
                            <label>Correct Answer *</label>
                            <input type="text" class="correct-answer-display" placeholder="Select option above" readonly>
                        </div>
                    </div>
                    
                    ${questionCount > 1 ? `<button type="button" onclick="removeQuestion('${questionId}')" class="btn-remove">
                        <i class="fas fa-trash"></i> Remove Question
                    </button>` : ''}
                </div>
            `;
            
            document.getElementById('questionsContainer').insertAdjacentHTML('beforeend', questionHTML);
            updateQuestionCount();
        }
        
        function removeQuestion(questionId) {
            document.getElementById(questionId).remove();
            questionCount--;
            // Renumber remaining questions
            const questions = document.querySelectorAll('.question-card');
            questions.forEach((card, index) => {
                const newNumber = index + 1;
                card.querySelector('.question-number').textContent = newNumber;
                card.querySelector('.question-text').placeholder = `Enter question ${newNumber} text...`;
                // Update labels
                const label = card.querySelector('label');
                if (label) label.textContent = `Question ${newNumber} *`;
            });
            updateQuestionCount();
        }
        
        function setCorrectOption(questionId, option) {
            const questionCard = document.getElementById(questionId);
            
            // Remove correct class from all options
            questionCard.querySelectorAll('.option-row').forEach(row => {
                row.classList.remove('correct-option');
            });
            
            // Add correct class to selected option
            const selectedRow = questionCard.querySelector(`[data-option="${option}"]`).parentElement;
            selectedRow.classList.add('correct-option');
            
            // Update radio button
            questionCard.querySelector(`input[value="${option}"]`).checked = true;
            
            // Update correct answer display
            questionCard.querySelector('.correct-answer-display').value = option;
        }
        
        function updateCharCount(textarea, questionId) {
            const count = textarea.value.length;
            document.getElementById(`charCount-${questionId}`).textContent = `${count}/1000 characters`;
            if (count > 1000) {
                textarea.value = textarea.value.substring(0, 1000);
            }
        }
        
        function updateQuestionCount() {
            document.getElementById('totalQuestions').textContent = questionCount;
            calculateTotalMarks();
        }
        
        function calculateTotalMarks() {
            let total = 0;
            document.querySelectorAll('.marks-input').forEach(input => {
                total += parseInt(input.value) || 0;
            });
            document.getElementById('calculatedMarks').textContent = total;
            return total;
        }
        
        function validateExam() {
            const validationDiv = document.getElementById('validationMessage');
            const errors = [];
            
            // Check exam details
            const title = document.getElementById('examTitle').value.trim();
            const subject = document.getElementById('examSubject').value.trim();
            const duration = document.getElementById('duration').value;
            const totalMarks = document.getElementById('totalMarks').value;
            
            if (!title) errors.push("Exam title is required");
            if (!subject) errors.push("Subject is required");
            if (!duration || duration < 5) errors.push("Duration must be at least 5 minutes");
            if (!totalMarks || totalMarks < 10) errors.push("Total marks must be at least 10");
            
            // Check questions
            if (questionCount === 0) {
                errors.push("At least one question is required");
            } else {
                document.querySelectorAll('.question-card').forEach((card, index) => {
                    const questionText = card.querySelector('.question-text').value.trim();
                    const marks = card.querySelector('.marks-input').value;
                    const correctAnswer = card.querySelector('.correct-answer-display').value;
                    
                    if (!questionText) errors.push(`Question ${index + 1}: Question text is required`);
                    if (!marks || marks < 1) errors.push(`Question ${index + 1}: Marks must be at least 1`);
                    if (!correctAnswer) errors.push(`Question ${index + 1}: Correct answer must be selected`);
                    
                    // Check if at least 2 options are filled
                    const optionInputs = card.querySelectorAll('.option-input');
                    const filledOptions = Array.from(optionInputs).filter(input => input.value.trim()).length;
                    if (filledOptions < 2) {
                        errors.push(`Question ${index + 1}: At least 2 options must be filled`);
                    }
                });
            }
            
            // Check calculated marks vs total marks
            const calculatedMarks = calculateTotalMarks();
            if (calculatedMarks !== parseInt(totalMarks)) {
                errors.push(`Calculated marks (${calculatedMarks}) don't match total marks (${totalMarks})`);
            }
            
            if (errors.length === 0) {
                validationDiv.innerHTML = '<p style="color: green;"><i class="fas fa-check-circle"></i> Exam is valid and ready to create!</p>';
                validationDiv.style.backgroundColor = '#e8f5e9';
                return true;
            } else {
                validationDiv.innerHTML = '<p style="color: red;"><i class="fas fa-exclamation-triangle"></i> Validation Errors:</p>' +
                    '<ul style="text-align: left; margin-left: 20px;">' +
                    errors.map(error => `<li>${error}</li>`).join('') +
                    '</ul>';
                validationDiv.style.backgroundColor = '#ffebee';
                return false;
            }
        }
        
        function previewExam() {
            const previewBox = document.getElementById('previewBox');
            const title = document.getElementById('examTitle').value || '[No title]';
            const subject = document.getElementById('examSubject').value || '[No subject]';
            const duration = document.getElementById('duration').value || '60';
            const instructions = document.getElementById('instructions').value || 'No instructions provided.';
            
            let previewHTML = `
                <h3 style="color: #2196F3;">${title}</h3>
                <p><strong>Subject:</strong> ${subject}</p>
                <p><strong>Duration:</strong> ${duration} minutes</p>
                <p><strong>Instructions:</strong> ${instructions}</p>
                <hr>
                <h4>Questions Preview:</h4>
            `;
            
            document.querySelectorAll('.question-card').forEach((card, index) => {
                const questionText = card.querySelector('.question-text').value || '[Question text not provided]';
                const marks = card.querySelector('.marks-input').value || '0';
                const correctAnswer = card.querySelector('.correct-answer-display').value || 'Not selected';
                
                previewHTML += `
                    <div style="margin: 15px 0; padding: 15px; background: white; border-radius: 5px;">
                        <p><strong>Q${index + 1}:</strong> ${questionText} <em>(${marks} marks)</em></p>
                        <p><strong>Correct Answer:</strong> ${correctAnswer}</p>
                    </div>
                `;
            });
            
            previewBox.innerHTML = previewHTML;
            previewBox.style.display = 'block';
        }
        
        async function submitExam() {
            if (!validateExam()) {
                alert('Please fix validation errors before submitting.');
                return;
            }
            
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '<p>Creating exam...</p>';
            
            // Collect exam data
            const examData = {
                title: document.getElementById('examTitle').value.trim(),
                subject: document.getElementById('examSubject').value.trim(),
                duration_minutes: parseInt(document.getElementById('duration').value),
                total_marks: parseInt(document.getElementById('totalMarks').value),
                admin_id: admin.id,
                questions: []
            };
            
            // Collect questions
            document.querySelectorAll('.question-card').forEach(card => {
                const question = {
                    question_text: card.querySelector('.question-text').value.trim(),
                    option_a: card.querySelector('[data-option="A"]').value.trim(),
                    option_b: card.querySelector('[data-option="B"]').value.trim(),
                    option_c: card.querySelector('[data-option="C"]').value.trim(),
                    option_d: card.querySelector('[data-option="D"]').value.trim(),
                    correct_answer: card.querySelector('.correct-answer-display').value,
                    marks: parseInt(card.querySelector('.marks-input').value)
                };
                
                examData.questions.push(question);
            });
            
            try {
                const response = await fetch('http://localhost:5000/api/admin/exam/create-new', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(examData)
                });
                
                const data = await response.json();
                
                if (response.status === 201) {
                    messageDiv.innerHTML = `
                        <p style="color: green;"><i class="fas fa-check-circle"></i> Exam Created Successfully!</p>
                        <p><strong>Exam ID:</strong> ${data.exam_id}</p>
                        <p><strong>Title:</strong> ${examData.title}</p>
                        <p><strong>Questions:</strong> ${examData.questions.length}</p>
                        <p>Redirecting to dashboard...</p>
                    `;
                    
                    // Redirect after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'admin_dashboard.html';
                    }, 3000);
                    
                } else {
                    messageDiv.innerHTML = `<p style="color: red;"><i class="fas fa-exclamation-circle"></i> Error: ${data.error || 'Failed to create exam'}</p>`;
                }
                
            } catch (error) {
                messageDiv.innerHTML = `<p style="color: red;"><i class="fas fa-exclamation-circle"></i> Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
