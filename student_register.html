<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="login_registration.css">
</head>
<body>
    <div class="container">
        <h1>📝 Student Registration</h1>
        
        <div class="form-container">
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password:</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                </div>
                <div class="form-group">
    <label>Face Registration:</label>

    <video id="video"
           width="320"
           height="240"
           autoplay
           style="border:2px solid #ccc;">
    </video>

    <br><br>

    <button
        type="button"
        onclick="captureFace()">

        Capture Face

    </button>

    <canvas
        id="canvas"
        width="320"
        height="240"
        style="display:none;">
    </canvas>

    <input
        type="hidden"
        id="profilePhoto">
</div>
                <button type="submit" class="btn register-btn">Register</button>
               
            </form>
            
            <div class="links">
                <a href="student_login.html">🔐 Already have an account? Login Here</a>
                <a href="index.html">🏠 Back to Home</a>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        navigator.mediaDevices
.getUserMedia({
    video:true
})
.then(stream => {

    document
    .getElementById('video')
    .srcObject = stream;

});

function captureFace() {

    const video =
        document.getElementById(
            'video'
        );

    const canvas =
        document.getElementById(
            'canvas'
        );

    const ctx =
        canvas.getContext('2d');

    ctx.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
    );

    const image =
        canvas.toDataURL(
            'image/jpeg'
        );

    document
    .getElementById(
        'profilePhoto'
    ).value = image;

    alert(
        "Face Captured Successfully"
    );
}
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            // Validate
            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<p style="color: red;">❌ Passwords do not match!</p>';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.innerHTML = '<p style="color: red;">❌ Password must be at least 6 characters!</p>';
                return;
            }
            
            messageDiv.innerHTML = '<p>Registering user...</p>';
            
            try {
                const response = await fetch('http://localhost:5000/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                   body: JSON.stringify({
    name: name,
    email: email,
    password: password,
    role: 'student',
    profile_photo:
        document.getElementById(
            'profilePhoto'
        ).value
})
                });
                
                const data = await response.json();
                
                if (response.status === 201) {
                    messageDiv.innerHTML = `<p style="color: green;">✅ Registration Successful!</p>`;
                    messageDiv.innerHTML += `<p>User ID: ${data.user_id}</p>`;
                    messageDiv.innerHTML += `<p>Email: ${data.email}</p>`;
                    messageDiv.innerHTML += '<p>Redirecting to login...</p>';
                    
                    // Redirect after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'student_login.html';
                    }, 3000);
                    
                } else {
                    messageDiv.innerHTML = `<p style="color: red;">❌ ${data.error || 'Registration failed'}</p>`;
                }
                
            } catch (error) {
                messageDiv.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
