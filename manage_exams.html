<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Exams - Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .exams-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .search-box {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        
        .exams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .exam-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 20px;
            transition: transform 0.3s;
        }
        
        .exam-card:hover {
            transform: translateY(-5px);
        }
        
        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .exam-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }
        
        .exam-id {
            background: #e3f2fd;
            color: #2196F3;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .exam-meta {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            font-size: 14px;
            color: #666;
        }
        
        .exam-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .exam-stats {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 20px;
            font-weight: bold;
            color: #2196F3;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        
        .exam-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            justify-content: center;
        }
        
        .btn-view { background: #4CAF50; color: white; }
        .btn-edit { background: #FF9800; color: white; }
        .btn-delete { background: #f44336; color: white; }
        .btn-results { background: #2196F3; color: white; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        
        .no-exams {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        
        .filter-options {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .filter-btn.active {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }
    </style>
</head>
<body>
    <div class="exams-container">
        <h1><i class="fas fa-tasks"></i> Manage Exams</h1>
        <p>View, edit, or delete exams created in the system</p>
        
        <div class="links" style="margin-bottom: 20px;">
            <a href="admin_dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            <a href="create_exam.html" style="background: #4CAF50; color: white; padding: 10px 20px; border-radius: 5px;">
                <i class="fas fa-plus"></i> Create New Exam
            </a>
        </div>
        
        <!-- Search and Filter -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search exams by title, subject, or ID...">
            <button onclick="searchExams()" class="btn" style="background: #2196F3;">
                <i class="fas fa-search"></i> Search
            </button>
            <button onclick="clearSearch()" class="btn" style="background: #666;">
                <i class="fas fa-times"></i> Clear
            </button>
        </div>
        
        <div class="filter-options">
            <button class="filter-btn active" onclick="filterExams('all')">All Exams</button>
            <button class="filter-btn" onclick="filterExams('recent')">Recent</button>
            <button class="filter-btn" onclick="filterExams('math')">Mathematics</button>
            <button class="filter-btn" onclick="filterExams('science')">Science</button>
            <button class="filter-btn" onclick="filterExams('active')">Active</button>
        </div>
        
        <!-- Exams Grid -->
        <div id="examsGrid" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Loading exams...
        </div>
        
        <!-- Delete Confirmation Modal -->
        <div id="deleteModal" class="modal">
            <div class="modal-content">
                <h2><i class="fas fa-exclamation-triangle"></i> Confirm Delete</h2>
                <p id="deleteMessage">Are you sure you want to delete this exam?</p>
                <div class="modal-actions">
                    <button onclick="confirmDelete()" class="action-btn" style="background: #f44336;">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                    <button onclick="closeModal()" class="action-btn" style="background: #666;">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
        
        <!-- View Exam Modal -->
        <div id="viewModal" class="modal">
            <div class="modal-content">
                <h2 id="viewTitle"></h2>
                <div id="viewContent"></div>
                <div class="modal-actions">
                    <button onclick="closeModal()" class="action-btn" style="background: #666;">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check admin login
        const admin = JSON.parse(localStorage.getItem('admin'));
        if (!admin || admin.role !== 'admin') {
            alert('Access denied. Please login as admin.');
            window.location.href = 'admin_login.html';
        }
        
        let allExams = [];
        let examToDelete = null;
        
        async function loadExams() {
            const examsGrid = document.getElementById('examsGrid');
            examsGrid.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading exams...';
            
            try {
                const response = await fetch('http://localhost:5000/api/admin/exams');
                const data = await response.json();
                
                if (response.ok) {
                    allExams = data;
                    displayExams(allExams);
                } else {
                    examsGrid.innerHTML = `<p style="color: red;">Error loading exams: ${data.error}</p>`;
                }
            } catch (error) {
                examsGrid.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        function displayExams(exams) {
            const examsGrid = document.getElementById('examsGrid');
            
            if (exams.length === 0) {
                examsGrid.innerHTML = `
                    <div class="no-exams">
                        <i class="fas fa-file-alt" style="font-size: 48px; color: #ccc; margin-bottom: 20px;"></i>
                        <h3>No Exams Found</h3>
                        <p>No exams have been created yet.</p>
                        <button onclick="window.location.href='create_exam.html'" class="btn" style="background: #4CAF50; margin-top: 20px;">
                            <i class="fas fa-plus"></i> Create Your First Exam
                        </button>
                    </div>
                `;
                return;
            }
            
            examsGrid.className = 'exams-grid';
            examsGrid.innerHTML = '';
            
            exams.forEach(exam => {
                const examCard = document.createElement('div');
                examCard.className = 'exam-card';
                
                // Format date
                const createdDate = new Date(exam.created_at).toLocaleDateString();
                
                examCard.innerHTML = `
                    <div class="exam-header">
                        <h3 class="exam-title">${exam.title}</h3>
                        <span class="exam-id">ID: ${exam.id}</span>
                    </div>
                    
                    <div class="exam-meta">
                        <span><i class="fas fa-book"></i> ${exam.subject || 'General'}</span>
                        <span><i class="fas fa-clock"></i> ${exam.duration_minutes} min</span>
                        <span><i class="fas fa-star"></i> ${exam.total_marks} marks</span>
                    </div>
                    
                    <p style="color: #666; font-size: 14px; margin: 10px 0;">
                        Created by: <strong>${exam.admin_name}</strong> on ${createdDate}
                    </p>
                    
                    <div class="exam-stats">
                        <div class="stat-item">
                            <div class="stat-number">${exam.question_count || 0}</div>
                            <div class="stat-label">Questions</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${exam.attempts_count || 0}</div>
                            <div class="stat-label">Attempts</div>
                        </div>
                    </div>
                    
                    <div class="exam-actions">
                        <button onclick="viewExamDetails(${exam.id})" class="action-btn btn-view">
                            <i class="fas fa-eye"></i> View
                        </button>
                        <button onclick="editExam(${exam.id})" class="action-btn btn-edit">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button onclick="deleteExamPrompt(${exam.id}, '${exam.title}')" class="action-btn btn-delete">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                        <button onclick="viewResults(${exam.id})" class="action-btn btn-results">
                            <i class="fas fa-chart-bar"></i> Results
                        </button>
                    </div>
                `;
                
                examsGrid.appendChild(examCard);
            });
        }
        
        function searchExams() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (!searchTerm) {
                displayExams(allExams);
                return;
            }
            
            const filtered = allExams.filter(exam => 
                exam.title.toLowerCase().includes(searchTerm) ||
                exam.subject.toLowerCase().includes(searchTerm) ||
                exam.id.toString().includes(searchTerm) ||
                exam.admin_name.toLowerCase().includes(searchTerm)
            );
            
            displayExams(filtered);
        }
        
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            displayExams(allExams);
            // Reset filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.filter-btn').classList.add('active');
        }
        
        function filterExams(filter) {
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            let filtered = allExams;
            
            switch(filter) {
                case 'recent':
                    // Show exams from last 7 days
                    const weekAgo = new Date();
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    filtered = allExams.filter(exam => new Date(exam.created_at) > weekAgo);
                    break;
                    
                case 'math':
                    filtered = allExams.filter(exam => 
                        exam.subject.toLowerCase().includes('math') || 
                        exam.title.toLowerCase().includes('math')
                    );
                    break;
                    
                case 'science':
                    filtered = allExams.filter(exam => 
                        exam.subject.toLowerCase().includes('science') || 
                        exam.title.toLowerCase().includes('science')
                    );
                    break;
                    
                case 'active':
                    filtered = allExams.filter(exam => exam.attempts_count > 0);
                    break;
                    
                default:
                    // Show all
            }
            
            displayExams(filtered);
        }
        
        async function viewExamDetails(examId) {
            try {
                const response = await fetch(`http://localhost:5000/api/admin/exam/${examId}`);
                const exam = await response.json();
                
                if (response.ok) {
                    document.getElementById('viewTitle').textContent = exam.title;
                    
                    let content = `
                        <p><strong>Subject:</strong> ${exam.subject}</p>
                        <p><strong>Duration:</strong> ${exam.duration_minutes} minutes</p>
                        <p><strong>Total Marks:</strong> ${exam.total_marks}</p>
                        <p><strong>Created by:</strong> ${exam.admin_name}</p>
                        <p><strong>Created on:</strong> ${new Date(exam.created_at).toLocaleString()}</p>
                        
                        <hr>
                        <h3>Questions (${exam.questions.length})</h3>
                    `;
                    
                    // ✅ CORRECTED: Removed duplicate line
                    exam.questions.forEach((q, index) => {
                        content += `
                            <div style="margin: 15px 0; padding: 15px; background: #f5f5f5; border-radius: 5px;">
                                <p><strong>Q${index + 1}:</strong> ${q.question_text}</p>
                                <p><strong>Options:</strong></p>
                                <ul>
                                    ${q.option_a ? `<li>A: ${q.option_a}</li>` : ''}
                                    ${q.option_b ? `<li>B: ${q.option_b}</li>` : ''}
                                    ${q.option_c ? `<li>C: ${q.option_c}</li>` : ''}
                                    ${q.option_d ? `<li>D: ${q.option_d}</li>` : ''}
                                </ul>
                                <p><strong>Correct Answer:</strong> ${q.correct_answer}</p>
                                <p><strong>Marks:</strong> ${q.marks}</p>
                            </div>
                        `;
                    });
                    
                    document.getElementById('viewContent').innerHTML = content;
                    document.getElementById('viewModal').style.display = 'flex';
                    
                } else {
                    alert(`Error: ${exam.error}`);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }
        
        function editExam(examId) {
            alert(`Edit exam ${examId} - This feature will be implemented next!`);
            // window.location.href = `edit_exam.html?id=${examId}`;
        }
        
        function deleteExamPrompt(examId, examTitle) {
            examToDelete = examId;
            document.getElementById('deleteMessage').textContent = 
                `Are you sure you want to delete the exam "${examTitle}"? This action cannot be undone and will delete all related questions and results.`;
            document.getElementById('deleteModal').style.display = 'flex';
        }
        
        async function confirmDelete() {
            if (!examToDelete) return;
            
            try {
                const response = await fetch(`http://localhost:5000/api/admin/exam/${examToDelete}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Exam deleted successfully!');
                    closeModal();
                    loadExams(); // Reload the list
                } else {
                    alert(`Error: ${data.error}`);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
            
            examToDelete = null;
        }
        
        function viewResults(examId) {
            window.location.href = `view_results.html?exam_id=${examId}`;
        }
        
        function closeModal() {
            document.getElementById('deleteModal').style.display = 'none';
            document.getElementById('viewModal').style.display = 'none';
            examToDelete = null;
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal();
            }
        };
        
        // Load exams on page load
        window.onload = loadExams;
    </script>
</body>
</html>
