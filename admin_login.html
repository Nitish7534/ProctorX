<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Exam Proctoring</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            margin: -40px -40px 30px -40px;
        }
        
        .security-note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1>🔐 Admin Portal</h1>
            <p>Secure administrative access only</p>
        </div>
        
        <div class="security-note">
            <strong>⚠️ Security Notice:</strong> This area is restricted to authorized administrators only.
            Unauthorized access is prohibited.
        </div>
        
        <div class="form-container">
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Admin Email:</label>
                    <input type="email" id="email" placeholder="admin@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Admin Password:</label>
                    <input type="password" id="password" placeholder="Enter admin password" required>
                </div>
                
                <button type="submit" class="btn" style="background: #ff416c;">
                    🔑 Admin Login
                </button>
            </form>
            
            <div class="demo-credentials">
                <p><strong>Demo Admin Credentials:</strong></p>
                <p>Email: <code>admin@example.com</code></p>
                <p>Password: <code>admin123</code></p>
            </div>
            
            <div class="links">
                <a href="index.html">🏠 Back to Home</a>
                <a href="student_login.html">👨‍🎓 Student Login</a>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.innerHTML = '<p>Verifying admin credentials...</p>';
            
            try {
                // Try admin-specific login first
                const response = await fetch('http://localhost:5000/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.innerHTML = `<p style="color: green;">✅ Admin Login Successful!</p>`;
                    messageDiv.innerHTML += `<p>Welcome Administrator: ${data.user.name}</p>`;
                    
                    // Store admin data
                    localStorage.setItem('admin', JSON.stringify(data.user));
                    
                    // Redirect to admin dashboard
                    setTimeout(() => {
                        window.location.href = 'admin_dashboard.html';
                    }, 1500);
                    
                } else {
                    // Fallback to regular login (check if user is admin)
                    const regularResponse = await fetch('http://localhost:5000/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email,
                            password: password
                        })
                    });
                    
                    const regularData = await regularResponse.json();
                    
                    if (regularResponse.ok && regularData.user.role === 'admin') {
                        messageDiv.innerHTML = `<p style="color: green;">✅ Admin Login Successful!</p>`;
                        localStorage.setItem('admin', JSON.stringify(regularData.user));
                        setTimeout(() => {
                            window.location.href = 'admin_dashboard.html';
                        }, 1500);
                    } else {
                        messageDiv.innerHTML = `<p style="color: red;">❌ ${data.error || 'Invalid admin credentials'}</p>`;
                    }
                }
                
            } catch (error) {
                messageDiv.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        });
        
        // Auto-fill demo credentials for testing
        window.onload = function() {
            document.getElementById('email').value = 'admin@example.com';
            document.getElementById('password').value = 'admin123';
        };
    </script>
</body>
</html>
